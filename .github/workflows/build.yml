name: Build AideAI Mod
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build Mod
        run: chmod +x gradlew && ./gradlew build --no-daemon -x neoFormPatchUserDev
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AideAI-1.0.0
          path: build/libs/*.jar
